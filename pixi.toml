[workspace]
name      = "eindir"
version   = "0.3.0"
description = "Typed primitives for ND objective functions and bounded sampling."
channels  = ["conda-forge"]
platforms = ["linux-64", "osx-arm64", "osx-64"]

[activation.env]
# Pixi inherits the host cargo config; the conda rust toolchain ships its
# own gcc which does not understand -fuse-ld=/usr/bin/mold. Clear inherited
# rustflags so the conda-managed linker is driven cleanly.
CARGO_BUILD_RUSTFLAGS = ""
RUSTFLAGS = ""

[tasks]
test     = "cargo test"
test-all = "cargo test --all-features"
bench    = "cargo bench"
build    = "cargo build --release"

[dependencies]
rust = ">=1.88"

[feature.python.dependencies]
python  = ">=3.10"
maturin = ">=1.5"
pytest  = "*"
pip     = "*"

[feature.python.tasks]
python-build = "maturin develop --features python"
python-test  = { cmd = "pytest pytest/", depends-on = ["python-build"] }

[feature.docs.dependencies]
python = ">=3.10"
emacs  = "*"
sphinx = ">=7,<9"
pandoc = ">=3.1,<4"

[feature.docs.pypi-dependencies]
shibuya                    = ">=2026.1.9, <2027"
sphinxcontrib-rust         = ">=1.0.0, <2"
sphinx-rustdoc-postprocess = ">=0.1.0, <0.2"

[feature.docs.tasks]
# --root $CONDA_PREFIX lands the binary at .pixi/envs/docs/bin/sphinx-rustdocgen
# so it is on PATH inside the docs env. Without this, cargo defaults to
# ~/.cargo/bin which is not on PATH for pixi-spawned shells.
setup-rustdocgen = "test -x $CONDA_PREFIX/bin/sphinx-rustdocgen || cargo install --root $CONDA_PREFIX sphinx-rustdocgen"
orgbld           = "emacs --batch -l docs/export.el"
docbld           = { cmd = "sphinx-build docs/source docs/build -b html", depends-on = ["orgbld", "setup-rustdocgen"] }

[environments]
default = { solve-group = "default" }
python  = { features = ["python"], solve-group = "default" }
docs    = { features = ["docs"],   solve-group = "default" }
